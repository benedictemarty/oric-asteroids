FEATURES {
    STARTADDRESS: default = $0500;
}
SYMBOLS {
    __STACKSIZE__:  type = weak, value = $0200;
    __STACKSTART__: type = weak, value = $9FFF;
    __ZPSTART__:    type = weak, value = $0080;
}
# --- Carte ZP versionnée (mise à jour 2026-05-13, revue senior) -------
# 80 octets disponibles à $0080-$00CF, ~46 utilisés actuellement.
#
# input.s    : kb_pcr_save, kb_ddra_save, kb_ddrb_save, kb_tmp           4
# line.s     : _lx0/_ly0/_lx1/_ly1 + l_dx,l_dy,l_sx,l_sy + l_err_lo,
#              l_err_hi + l_ptr(2) + l_e2lo,l_e2hi + l_mask + l_pix     16
# line.s SMC : cs_src(2)                                                 2
# ship.s     : _ship_x, _ship_y, _ship_x_frac, _ship_y_frac,
#              _ship_vx(2), _ship_vy(2), _ship_angle, _key_state         10
#              + sh_tx0..ty4 (5 sommets × 2)                             10
# sound.s    : _sfx_id, _sfx_timer, sound_tmp, sweep_idx                 4
# Total ≈ 46 octets ; reste ~34 octets libres en ZP.
# ----------------------------------------------------------------------
MEMORY {
    ZP:  file = "",  define = yes, start = __ZPSTART__, size = $0050;
    RAM: file = %O,  define = yes, start = $0500,       size = $9A00;
}
SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp;
    STARTUP:  load = RAM, type = ro;
    LOWCODE:  load = RAM, type = ro,  optional = yes;
    ONCE:     load = RAM, type = ro,  optional = yes;
    CODE:     load = RAM, type = ro;
    RODATA:   load = RAM, type = ro;
    DATA:     load = RAM, type = rw;
    BSS:      load = RAM, type = bss, define = yes, optional = yes;
}
FEATURES {
    CONDES: type  = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__,
            segment = CODE;
    CONDES: type  = destructor,
            label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__,
            segment = CODE;
}
